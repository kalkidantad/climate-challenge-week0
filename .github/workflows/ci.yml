name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports and syntax
        run: |
          python -m compileall -q app notebooks
          PYTHONPATH=. python -c "from notebooks import eda_pipeline, compare_pipeline"

      - name: Check Python version
        run: python --version
